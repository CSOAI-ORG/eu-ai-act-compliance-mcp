# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "EU AI Act Compliance"
slug: "eu-ai-act-compliance"
description: "EU AI Act (Regulation 2024/1689) compliance MCP — risk classification, 42-point audit, Article 11 documentation, penalty calculator, post-Digital Omnibus timelines. By MEOK AI Labs."

runtime: python
entry: "server.py"

build:
