# smithery.yaml — Smithery (https://smithery.ai) submission payload
# Repo: CSOAI-ORG/eu-ai-act-compliance-mcp
# Generated: 2026-06-09
# Transport: streamable-HTTP (OCI container at ghcr.io/csoai-org/eu_ai_act_compliance)
# See: DISTRIBUTION_GAPS_2026-06-08.md for the channel strategy
runtime: container
startCommand:
  type: http
  transport: streamable-http
  port: 8081
  path: /mcp
  health: /healthz
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "MEOK API key (optional; required for x402 paywalled tools)"
        default: ""
      x402PayTo:
        type: string
        description: "USDC address for x402 micropayments"
        default: ""
    additionalProperties: false
build:
  dockerfile: Dockerfile
  dockerBuildArgs:
    PKG: eu_ai_act_compliance
